# Per-connector README frontmatter schema — location scope (PHP mirror)
# Authoritative source for the single YAML frontmatter block at the TOP of every
# `src/Providers/<Provider>/README.md` (opening `---` on line 1, so GitHub renders
# it as real frontmatter instead of leaking it into the page body). See
# .ai/CONVENTIONS.md for the AI-agent cheatsheet; this file is the canonical schema
# enforced by `scripts/validate-frontmatter.php`.
#
# Location scope keys operations under `operations:` (a map of operation →
# metadata; operations are routing / matrix / geocoding / isochrone) rather than
# the single `channel` notifications uses, and adds `selfHostable` +
# `rateLimitDocsUrl` per operation. One README per provider holds every operation
# that provider supports as one entry under `operations`. The schema body matches
# the TS sibling verbatim.
$schema: https://json-schema.org/draft/2020-12/schema
type: object
required:
  - providerId
  - operations
properties:
  providerId:
    type: string
    pattern: '^[a-z][a-z0-9-]*$'
  operations:
    type: object
    minProperties: 1
    propertyNames:
      enum: [routing, matrix, geocoding, isochrone]
    additionalProperties:
      type: object
      required:
        - auth
        - endpoint
        - versioning
        - selfHostable
        - notes_passthrough
      properties:
        auth:
          type: object
          required: [method, tokenLifecycle]
          properties:
            method:
              type: string
              enum:
                - api-key-header
                - api-key-query
                - api-key-form
                - bearer
                - arcgis-token
                - oauth2-client-credentials
                - none
            tokenLifecycle:
              type: string
              enum: [static, rotating, refreshable, none]
            regionalEndpoints:
              type: array
              items:
                type: string
          additionalProperties: false
        endpoint:
          type: object
          required: [default]
          properties:
            default:
              type: string
              format: uri
            regional:
              type: array
              items:
                type: string
          additionalProperties: false
        versioning:
          type: object
          required: [vendorApiVersion, lastVerified]
          properties:
            vendorApiVersion:
              type: string
            lastVerified:
              type: string
              format: date
          additionalProperties: false
        selfHostable:
          type: boolean
        rateLimitDocsUrl:
          type: [string, "null"]
        retryAfterSurfaced:
          type: boolean
        notes_passthrough:
          type: string
      additionalProperties: false
additionalProperties: false
